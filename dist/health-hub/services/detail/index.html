<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab Reports</title>
    <link rel="stylesheet" href="../../../styles.css" />
    <script src="../../healthhub.js" defer></script>
  </head>
  <body class="healthhub-body">
    <main class="healthhub-shell" aria-label="Service detail">
      <section class="hh-sub-page hh-empty-record-page">
        <header class="hh-sub-header hh-sticky-header">
          <div class="healthhub-statusbar" aria-hidden="true">
            <span>4:36</span>
            <span class="healthhub-status-icons">
              <span class="healthhub-signal"></span>
              <span class="healthhub-wifi"></span>
              <b>62</b>
            </span>
          </div>
          <div class="hh-sub-titlebar">
            <a class="hh-back" href="../index.html" aria-label="Back"></a>
            <h1 data-hh-empty-title>Lab Reports</h1>
            <a class="hh-close" href="../../index.html" aria-label="Close"></a>
          </div>
        </header>

        <section class="hh-profile-row">
          <span class="hh-profile-icon" aria-hidden="true"></span>
          <div class="hh-profile-copy">
            <h2>MXXXX437J</h2>
            <p>MXXXX437J</p>
          </div>
          <button class="hh-switch" type="button">Switch <span aria-hidden="true"></span></button>
        </section>

        <section class="hh-record-empty-state">
          <div class="hh-lab-illustration" aria-hidden="true">
            <span></span>
          </div>
          <h2>You do not have any <span data-hh-empty-name>lab reports</span>.</h2>
          <p>Please be advised that it may take up to 4 working days for your records to be reflected here.</p>
        </section>
      </section>
    </main>
  </body>
</html>
