<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>onePA</title>
    <link rel="stylesheet" href="../../../styles.css" />
  </head>
  <body class="lifesg-body">
    <main class="lifesg-shell lifesg-shell--browser" aria-label="onePA facility booking">
      <section class="onepa-page">
        <header class="onepa-browser">
          <div class="lifesg-statusbar" aria-hidden="true">
            <span>10:59</span>
            <div class="lifesg-status-icons">
              <span class="lifesg-muted-bell"></span>
              <span class="lifesg-signal">
                <i></i><i></i><i></i><i></i>
              </span>
              <strong>4G</strong>
              <span class="lifesg-battery lifesg-battery--warning"><b>50</b></span>
            </div>
          </div>

          <div class="onepa-browser__top">
            <a class="onepa-circle onepa-circle--close" href="../sports/index.html" aria-label="关闭">
              <span></span>
            </a>
            <strong>onepa.gov.sg</strong>
            <button class="onepa-circle onepa-circle--menu" type="button" aria-label="更多">
              <span></span>
            </button>
          </div>

          <div class="onepa-government">
            <span class="onepa-government__crest" aria-hidden="true"></span>
            <span class="onepa-government__text">A Singapore Government Agency Website</span>
            <a href="./index.html">How to identify</a>
            <span class="onepa-government__chevron" aria-hidden="true"></span>
          </div>

          <div class="onepa-brandbar">
            <div class="onepa-logo" aria-label="onePA">
              <span class="onepa-logo__mark"></span>
              <strong>onePA</strong>
            </div>
            <div class="onepa-brandbar__icons" aria-hidden="true">
              <span class="profile"></span>
              <span class="passion"></span>
              <span class="cart"></span>
              <span class="hamburger"></span>
            </div>
          </div>
        </header>

        <section class="onepa-hero">
          <div class="onepa-hero__bg" aria-hidden="true"></div>
          <article class="onepa-book-card">
            <h1>Book a Facility</h1>

            <label>
              <span>What*</span>
              <input type="text" placeholder="Eg. Badminton Court" />
            </label>

            <label>
              <span>Where*</span>
              <input type="text" placeholder="Eg. Ang Mo Kio CC" />
            </label>

            <div class="onepa-book-card__row">
              <label>
                <span>Date</span>
                <button type="button">07 Jun 2026<i></i></button>
              </label>
              <label>
                <span>Time</span>
                <button type="button">All<i></i></button>
              </label>
            </div>

            <button class="onepa-search-button" type="button">Search</button>
          </article>
        </section>

        <section class="onepa-facilities">
          <h2>Our Facilities</h2>
          <p>Book one of our facilities at your convenience</p>

          <div class="onepa-grid">
            <article class="onepa-tile">
              <span class="onepa-photo badminton" aria-hidden="true"></span>
              <strong>Badminton Court</strong>
            </article>
            <article class="onepa-tile">
              <span class="onepa-photo basketball" aria-hidden="true"></span>
              <strong>Basketball Court</strong>
            </article>
            <article class="onepa-tile">
              <span class="onepa-photo bbq-cc" aria-hidden="true"></span>
              <strong>BBQ Pit (CC)</strong>
            </article>
            <article class="onepa-tile">
              <span class="onepa-photo bbq-rc" aria-hidden="true"></span>
              <strong>BBQ Pit (RC)</strong>
            </article>
            <article class="onepa-tile">
              <span class="onepa-photo futsal" aria-hidden="true"></span>
              <strong>Futsal Court</strong>
            </article>
            <article class="onepa-tile">
              <span class="onepa-photo soccer" aria-hidden="true"></span>
              <strong>Soccer Field</strong>
            </article>
            <article class="onepa-tile">
              <span class="onepa-photo table-tennis" aria-hidden="true"></span>
              <strong>Table Tennis Room</strong>
            </article>
            <article class="onepa-tile">
              <span class="onepa-photo tennis" aria-hidden="true"></span>
              <strong>Tennis Court</strong>
            </article>
          </div>
        </section>

        <div class="onepa-toolbar" aria-hidden="true">
          <span class="onepa-toolbar__back"></span>
          <div class="onepa-toolbar__actions">
            <span class="share"></span>
            <span class="refresh"></span>
            <span class="compass"></span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
