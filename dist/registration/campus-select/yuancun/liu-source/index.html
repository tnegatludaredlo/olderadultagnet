<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <title>医生号源</title>
    <link rel="stylesheet" href="../../../../styles.css" />
    <script src="../../../../app.js" defer></script>
  </head>
  <body>
    <main class="phone-shell" aria-label="医生号源">
      <section class="app-page is-active sub-page" data-screen="snore-liu-source" aria-label="刘洁医生号源页面">
        <header class="sub-header">
          <div class="statusbar sub-statusbar" aria-hidden="true">
            <span>11:54</span>

            <button class="back-button" type="button" aria-label="返回耳鼻喉鼾症门诊" data-nav-back-target="snore-clinic-0519">
              <span></span>
            </button>
            <h1>医生号源</h1>
            <div class="mini-actions" aria-label="微信小程序操作">
              <button type="button" aria-label="更多">•••</button>
              <button type="button" aria-label="关闭">◎</button>
            </div>
          </div>
        </header>

        <section class="source-page">
          <article class="source-profile">
            <div class="source-profile__top">
              <div class="doctor-photo doctor-photo--large"><span>刘</span></div>
              <div class="source-profile__info">
                <div class="source-profile__name">
                  <h2>刘洁</h2>
                  <h3>副主任医师</h3>
                </div>
                <p>耳鼻喉鼾症门诊</p>
                <div class="source-profile__count">挂号量： 12053</div>
              </div>
              <button class="pill-button" type="button">医生动态</button>
            </div>
            <div class="source-profile__intro">
              <p>简介： 中山大学博士研究生。广东省医疗人才援疆专家，广东省科普专家，...</p>
              <button type="button">详情</button>
            </div>
          </article>

          <article class="schedule-card schedule-card--consult">
            <div class="schedule-card__consult-header">
              <h2>在线门诊 <span>(今日号源)</span></h2>
              <strong>08:00~20:00</strong>
            </div>
            <div class="schedule-card__line"></div>
            <div class="consult-row">
              <div class="consult-row__icon">💬</div>
              <div class="consult-row__body">
                <div class="consult-row__price">50元/次</div>
                <p>在线问诊、在线开方</p>
              </div>
              <span class="consult-row__remain">剩余 10</span>
            </div>
          </article>

          <article class="schedule-card">
            <h2>预约挂号</h2>
            <div class="schedule-card__line"></div>
            <div class="date-strip date-strip--embedded date-strip--wide">
              <button class="date-nav date-nav--left" type="button" aria-label="上一周">
                <span></span>
              </button>
              <button class="date-tab" type="button">
                <strong>05.14</strong>
                <span>今日约满</span>
              </button>
              <button class="date-tab date-tab--active" type="button">
                <strong>05.19</strong>
                <span>周二有号</span>
                <i></i>
              </button>
              <button class="date-tab" type="button">
                <strong>05.21</strong>
                <span>周四有号</span>
              </button>
              <button class="date-tab" type="button">
                <strong>05.26</strong>
                <span>周二有号</span>
              </button>
              <button class="date-tab" type="button">
                <strong>05.28</strong>
                <span>周四有号</span>
              </button>
              <button class="date-nav date-nav--right" type="button" aria-label="下一周">
                <span></span>
              </button>
            </div>

            <div class="slot-list">
              <button class="slot-row" type="button" data-nav-href="../snore-clinic/doctor-source/appointment-confirm/index.html?slot=liu-0519-1430">
                <span class="slot-time">14:30~15:00</span>
                <span class="slot-price">¥ 39</span>
                <span class="slot-remain">余2</span>
              </button>
              <button class="slot-row" type="button" data-nav-href="../snore-clinic/doctor-source/appointment-confirm/index.html?slot=liu-0519-1500">
                <span class="slot-time">15:00~15:30</span>
                <span class="slot-price">¥ 39</span>
                <span class="slot-remain">余4</span>
              </button>
              <button class="slot-row" type="button" data-nav-href="../snore-clinic/doctor-source/appointment-confirm/index.html?slot=liu-0519-1530">
                <span class="slot-time">15:30~16:00</span>
                <span class="slot-price">¥ 39</span>
                <span class="slot-remain">余4</span>
              </button>
              <button class="slot-row" type="button" data-nav-href="../snore-clinic/doctor-source/appointment-confirm/index.html?slot=liu-0519-1600">
                <span class="slot-time">16:00~16:30</span>
                <span class="slot-price">¥ 39</span>
                <span class="slot-remain">余4</span>
              </button>
              <button class="slot-row" type="button" data-nav-href="../snore-clinic/doctor-source/appointment-confirm/index.html?slot=liu-0519-1630">
                <span class="slot-time">16:30~17:00</span>
                <span class="slot-price">¥ 39</span>

              <button class="slot-row" type="button" data-nav-href="../snore-clinic/doctor-source/appointment-confirm/index.html?slot=liu-0519-1700">

                <span class="slot-price">¥ 39</span>
                <span class="slot-remain">余1</span>
