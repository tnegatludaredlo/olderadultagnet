<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>睡眠、记忆障碍专科门诊</title>
    <link rel="stylesheet" href="../../../../styles.css" />
    <script src="../../../../app.js" defer></script>
  </head>
  <body>
    <main class="phone-shell" aria-label="睡眠、记忆障碍专科门诊">
      <section class="app-page is-active sub-page" data-screen="sleep-memory-clinic" aria-label="睡眠记忆障碍专科门诊页面">
        <header class="sub-header">
          <div class="statusbar sub-statusbar" aria-hidden="true">
            <span>9:01</span>
            <span class="status-icons">▮▮▮ 5G <b>26</b></span>
          </div>
          <div class="sub-titlebar">
            <button class="back-button" type="button" aria-label="返回金融城员村" data-nav-back-target="campus-yuancun">
              <span></span>
            </button>
            <h1>睡眠、记忆障碍专科门诊</h1>
            <div class="mini-actions" aria-label="微信小程序操作">
              <button type="button" aria-label="更多">•••</button>
              <button type="button" aria-label="关闭">◎</button>
            </div>
          </div>
        </header>

        <section class="doctor-list-page">
          <div class="date-strip">
            <button class="date-nav date-nav--left" type="button" aria-label="上一周">
              <span></span>
            </button>
            <button class="date-tab date-tab--active" type="button">
              <strong>05.18</strong>
              <span>周一有号</span>
              <i></i>
            </button>
            <button class="date-tab" type="button">
              <strong>05.25</strong>
              <span>周一有号</span>
            </button>
            <button class="date-nav date-nav--right" type="button" aria-label="下一周">
              <span></span>
            </button>
          </div>

          <article class="doctor-card">
            <div class="doctor-card__photo doctor-photo">
              <span>赵</span>
            </div>
            <div class="doctor-card__body">
              <div class="doctor-card__header">
                <div>
                  <h2>赵江佩</h2>
                  <h3>主治医师</h3>
                </div>
                <button class="pill-button" type="button">下午有号</button>
              </div>
              <p>简介： 医学硕士，神经病学专业。</p>
              <p>擅长： 在神经科及老年病科临床工作二十余...</p>
              <button class="reserve-link" type="button" data-nav-target="doctor-source">
                <span class="reserve-link__check">✓</span>
                预约挂号
              </button>
            </div>
          </article>
        </section>
      </section>
    </main>
  </body>
</html>
