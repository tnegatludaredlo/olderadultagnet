<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>i 六院</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="phone-shell" aria-label="i 六院">
      <section class="app-page is-active" data-screen="home">
        <header class="top-area">
          <div class="statusbar" aria-hidden="true">
            <span>8:29</span>
            <span class="status-icons">▮▮▮ 5G <b>84</b></span>
          </div>
          <div class="app-title">
            <span>i 六院</span>
            <div class="mini-actions" aria-label="微信小程序操作">
              <button type="button" aria-label="更多">•••</button>
              <button type="button" aria-label="关闭">◎</button>
            </div>
          </div>
        </header>

        <section class="content">
          <article class="hero-card" aria-label="北院区健康体检预约">
            <div class="grid-bg"></div>
            <div class="mascot mascot-left" aria-hidden="true">
              <span class="face">◕‿◕</span>
            </div>
            <div class="hospital-brand">
              <span class="seal">⑥</span>
              <span>中山大学附属第六医院</span>
            </div>
            <h1>北院区健康体检预约</h1>
            <p>天河区瘦狗岭路17号</p>
            <div class="mascot mascot-right" aria-hidden="true">
              <span class="face">•‿•</span>
            </div>
            <div class="slide-dot" aria-hidden="true"></div>
          </article>

          <button class="notice" type="button">
            <span class="notice-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img"><path d="M4 10v4h4l7 5V5L8 10H4Zm13.6-1.7a5 5 0 0 1 0 7.4M20 6a8 8 0 0 1 0 12" /></svg>
            </span>
            <span>医疗电子票据及清单领取指南</span>
            <strong>查看公告</strong>
          </button>

          <section class="primary-grid" aria-label="核心服务">
            <button class="big-card" type="button" data-nav-target="registration">
              <span class="service-icon cross">+</span>
              <span>预约挂号</span>
            </button>
            <button class="big-card" type="button">
              <span class="service-icon chat">••</span>
              <span>在线门诊</span>
            </button>
          </section>

          <section class="quick-grid" aria-label="快捷服务">
            <button class="quick-card" type="button">
              <span class="quick-icon purple">
                <svg viewBox="0 0 24 24"><path d="M7 3v3M17 3v3M5 7h14v13H5zM8 13l3 3 5-6" /></svg>
              </span>
              <span>门诊报到</span>
            </button>
            <button class="quick-card" type="button">
              <span class="quick-icon coral">
                <svg viewBox="0 0 24 24"><path d="M12 4a5 5 0 0 1 5 5c0 4-5 9-5 9S7 13 7 9a5 5 0 0 1 5-5Zm-3 15h6M9 9h6M10 7h4" /></svg>
              </span>
              <span>门诊缴费</span>
            </button>
            <button class="quick-card" type="button">
              <span class="quick-icon blue">
                <svg viewBox="0 0 24 24"><path d="M7 4h11v16H7zM4 7h3M4 12h3M4 17h3M10 8h5M10 12h5" /></svg>
              </span>
              <span>报告查询</span>
            </button>
            <button class="quick-card" type="button">
              <span class="quick-icon green">
                <svg viewBox="0 0 24 24"><path d="M7 3v3M17 3v3M5 7h14v13H5zM9 14a4 4 0 0 0 6 0M10 11h.1M14 11h.1" /></svg>
              </span>
              <span>检查预约</span>
            </button>
          </section>

          <section class="tab-panel" aria-label="门诊住院综合服务">
            <div class="tabs" role="tablist">
              <button class="active" type="button">门诊</button>
              <button type="button">住院</button>
              <button type="button">综合</button>
            </div>
            <div class="menu-grid">
              <button type="button">
                <span class="line-icon">
                  <svg viewBox="0 0 24 24"><path d="M7 3h10v18H7zM10 8h4M10 12h4M10 16h2" /></svg>
                </span>
                <span>挂号记录</span>
              </button>
              <button type="button">
                <span class="line-icon">
                  <svg viewBox="0 0 24 24"><path d="M12 21s6-4.5 6-10a6 6 0 0 0-12 0c0 5.5 6 10 6 10zM9 10h6M12 7v6" /></svg>
                </span>
                <span>医保定点</span>
              </button>
              <button type="button">
                <span class="line-icon">
                  <svg viewBox="0 0 24 24"><path d="M6 3h12v18H6zM9 8h6M9 12h4M9 16h6M16 6l2 2" /></svg>
                </span>
                <span>检查检验开单</span>
              </button>
              <button type="button">
                <span class="line-icon">
                  <svg viewBox="0 0 24 24"><path d="M5 9h14v11H5zM7 9l10-4 2 4M9 13h6M12 11v6" /></svg>
                </span>
                <span>生殖胚胎续费</span>
              </button>
              <button type="button">
                <span class="line-icon">
                  <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9M12 7v5l3 2M17 5l2 2" /></svg>
                </span>
                <span>产科建档</span>
              </button>
              <button type="button">
                <span class="line-icon">
                  <svg viewBox="0 0 24 24"><path d="M8 4v8a4 4 0 0 0 8 0V4M6 4h4M14 4h4M12 16v4M9 20h6" /></svg>
                </span>
                <span>体检预约</span>
              </button>
              <button type="button">
                <span class="line-icon">
                  <svg viewBox="0 0 24 24"><path d="M5 19h14M8 17l7-7M12 6l6 6M10 8l6 6M7 15l4 4" /></svg>
                </span>
                <span>石蜡切片申请</span>
              </button>
              <button type="button">
                <span class="line-icon accent">
                  <svg viewBox="0 0 24 24"><path d="M7 3c4 3 4 6 0 9 4 3 4 6 0 9M17 3c-4 3-4 6 0 9-4 3-4 6 0 9M8 7h8M8 17h8" /></svg>
                </span>
                <span>病理会诊</span>
              </button>
            </div>
          </section>

          <section class="special-section" aria-label="特色服务">
            <h2>特色服务</h2>
            <div class="special-grid">
              <button class="special-card" type="button">
                <span class="special-icon gold">
                  <svg viewBox="0 0 24 24"><path d="M8 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM16 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM4 20v-2a4 4 0 0 1 8 0v2M12 20v-2a4 4 0 0 1 8 0v2" /></svg>
                </span>
                <span>团队问诊</span>
              </button>
              <button class="special-card" type="button">
                <span class="special-icon mint">
                  <svg viewBox="0 0 24 24"><path d="M4 16c4-8 10-10 17-8-4 2-5 6-7 9-3 4-7 3-10-1zM7 17c3-2 6-4 10-5" /></svg>
                </span>
                <span>肝转移中心</span>
              </button>
            </div>
          </section>
        </section>
      </section>

      <nav class="bottom-nav is-active" aria-label="底部导航" data-screen="home">
          <button class="active" type="button">
            <span class="nav-icon home">+</span>
            <span>首页</span>
          </button>
          <button type="button">
            <span class="nav-icon leaf"></span>
            <span>健康</span>
          </button>
          <button type="button">
            <span class="nav-icon bubble"></span>
            <span>消息</span>
          </button>
          <button type="button">
            <span class="nav-icon user"></span>
            <span>我的</span>
          </button>
      </nav>
    </main>
  </body>
</html>
