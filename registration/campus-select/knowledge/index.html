<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>知识城</title>
    <link rel="stylesheet" href="../../../styles.css" />
    <script src="../../../app.js" defer></script>
  </head>
  <body>
    <main class="phone-shell" aria-label="知识城">
      <section class="app-page is-active sub-page" data-screen="campus-knowledge" aria-label="知识城挂号页面">
        <header class="sub-header">
          <div class="statusbar sub-statusbar" aria-hidden="true">
            <span>8:50</span>
            <span class="status-icons">▮▮▮ 5G <b>29</b></span>
          </div>
          <div class="sub-titlebar">
            <button class="back-button" type="button" aria-label="返回选择院区" data-nav-back-target="campus-select">
              <span></span>
            </button>
            <h1>知识城</h1>
            <div class="mini-actions" aria-label="微信小程序操作">
              <button type="button" aria-label="更多">•••</button>
              <button type="button" aria-label="关闭">◎</button>
            </div>
          </div>
        </header>

        <section class="clinic-page">
          <button class="recent-doctor" type="button">
            <span>最近就诊的医生</span>
            <span class="recent-arrow" aria-hidden="true"></span>
          </button>
          <div class="clinic-layout">
            <aside class="clinic-sidebar">
              <button class="clinic-dept is-active" type="button">外科</button>
              <button class="clinic-dept" type="button">内科</button>
              <button class="clinic-dept" type="button">妇产科</button>
              <button class="clinic-dept" type="button">生殖医学中心</button>
              <button class="clinic-dept" type="button">儿科</button>
              <button class="clinic-dept" type="button">神经内科</button>
              <button class="clinic-dept" type="button">耳鼻咽喉头颈外科</button>
              <button class="clinic-dept" type="button">眼科</button>
              <button class="clinic-dept" type="button">口腔科</button>
              <button class="clinic-dept" type="button">中医科</button>
              <button class="clinic-dept" type="button">皮肤科</button>
              <button class="clinic-dept" type="button">康复医学科</button>
              <button class="clinic-dept" type="button">全科医学科</button>
              <button class="clinic-dept" type="button">护理门诊</button>
            </aside>
            <section class="clinic-main clinic-main--list">
              <button class="clinic-item" type="button">（知识城）胃肠肛门外科门诊</button>
              <button class="clinic-item" type="button">（知识城）结直肠癌门诊</button>
              <button class="clinic-item" type="button">（知识城）疝外科门诊</button>
              <button class="clinic-item" type="button">（知识城）肝胆胰脾外科门诊</button>
              <button class="clinic-item" type="button">（知识城）泌尿外科门诊</button>
              <button class="clinic-item" type="button">（知识城）胸外科门诊</button>
              <button class="clinic-item" type="button">（知识城）小儿外科门诊</button>
              <button class="clinic-item" type="button">（知识城）骨科门诊</button>
              <button class="clinic-item" type="button">（知识城）脊柱骨科门诊</button>
              <button class="clinic-item" type="button">（知识城）关节外科/运动医学科门诊</button>
              <button class="clinic-item" type="button">（知识城）肩痛门诊</button>
              <button class="clinic-item" type="button">（知识城）神经外科门诊</button>
              <button class="clinic-item" type="button">（知识城）甲状腺外科门诊</button>
              <button class="clinic-item" type="button">（知识城）腰腿痛门诊</button>
            </section>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
