<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>医生号源</title>
    <link rel="stylesheet" href="../../../../../styles.css" />
    <script src="../../../../../app.js" defer></script>
  </head>
  <body>
    <main class="phone-shell" aria-label="医生号源">
      <section class="app-page is-active sub-page" data-screen="doctor-source" aria-label="医生号源页面">
        <header class="sub-header">
          <div class="statusbar sub-statusbar" aria-hidden="true">
            <span>9:01</span>
            <span class="status-icons">▮▮▮ 5G <b>26</b></span>
          </div>
          <div class="sub-titlebar">
            <button class="back-button" type="button" aria-label="返回专科门诊" data-nav-back-target="sleep-memory-clinic">
              <span></span>
            </button>
            <h1>医生号源</h1>
            <div class="mini-actions" aria-label="微信小程序操作">
              <button type="button" aria-label="更多">•••</button>
              <button type="button" aria-label="关闭">◎</button>
            </div>
          </div>
        </header>

        <section class="source-page">
          <article class="source-profile">
            <div class="source-profile__top">
              <div class="doctor-photo doctor-photo--large"><span>赵</span></div>
              <div class="source-profile__info">
                <div class="source-profile__name">
                  <h2>赵江佩</h2>
                  <h3>主治医师</h3>
                </div>
                <p>睡眠、记忆障碍专科门诊</p>
                <div class="source-profile__count">挂号量： 5912</div>
              </div>
              <button class="pill-button" type="button">医生动态</button>
            </div>
            <div class="source-profile__intro">
              <p>简介： 医学硕士，神经病学专业。</p>
              <button type="button">详情</button>
            </div>
          </article>

          <article class="schedule-card">
            <h2>预约挂号</h2>
            <div class="schedule-card__line"></div>
            <div class="date-strip date-strip--embedded">
              <button class="date-nav date-nav--left" type="button" aria-label="上一周">
                <span></span>
              </button>
              <button class="date-tab date-tab--active" type="button">
                <strong>05.18</strong>
                <span>周一有号</span>
                <i></i>
              </button>
              <button class="date-tab" type="button">
                <strong>05.25</strong>
                <span>周一有号</span>
              </button>
              <button class="date-nav date-nav--right" type="button" aria-label="下一周">
                <span></span>
              </button>
            </div>

            <div class="slot-list">
              <button class="slot-row" type="button" data-nav-target="appointment-confirm">
                <span class="slot-time">14:30~15:00</span>
                <span class="slot-price">¥ 25</span>
                <span class="slot-remain">余1</span>
              </button>
              <button class="slot-row" type="button">
                <span class="slot-time">15:00~15:30</span>
                <span class="slot-price">¥ 25</span>
                <span class="slot-remain">余4</span>
              </button>
              <button class="slot-row" type="button">
                <span class="slot-time">15:30~16:00</span>
                <span class="slot-price">¥ 25</span>
                <span class="slot-remain">余4</span>
              </button>
              <button class="slot-row" type="button">
                <span class="slot-time">16:00~16:30</span>
                <span class="slot-price">¥ 25</span>
                <span class="slot-remain">余4</span>
              </button>
            </div>
          </article>
        </section>
      </section>
    </main>
  </body>
</html>
