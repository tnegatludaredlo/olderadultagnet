<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>预约挂号</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../app.js" defer></script>
  </head>
  <body>
    <main class="phone-shell" aria-label="预约挂号">
      <section class="app-page is-active sub-page" data-screen="registration" aria-label="预约挂号页面">
        <header class="sub-header">
          <div class="statusbar sub-statusbar" aria-hidden="true">
            <span>8:29</span>
            <span class="status-icons">▮▮▮ 5G <b>84</b></span>
          </div>
          <div class="sub-titlebar">
            <button class="back-button" type="button" aria-label="返回首页" data-nav-back>
              <span></span>
            </button>
            <h1>预约挂号</h1>
            <div class="mini-actions" aria-label="微信小程序操作">
              <button type="button" aria-label="更多">•••</button>
              <button type="button" aria-label="关闭">◎</button>
            </div>
          </div>
        </header>

        <section class="sub-content">
          <div class="register-list">
            <article class="register-card">
              <div class="register-card__lead">
                <span class="register-icon">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="4.5" y="5" width="15" height="14" rx="2.5"></rect>
                    <path d="M12 7.5v6M9 10.5h6M16.5 12.5h1.5M16.5 15.5h1.5M8 18v-4.5h4V18"></path>
                  </svg>
                </span>
                <h2>按院区挂号</h2>
              </div>
              <button class="go-button" type="button" data-nav-target="campus-select">去挂号</button>
            </article>

            <article class="register-card">
              <div class="register-card__lead">
                <span class="register-icon">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="4.5" y="6" width="15" height="13.5" rx="2.5"></rect>
                    <path d="M8 6V4.5h8V6M8.5 13l2.2 2.2L16 10"></path>
                  </svg>
                </span>
                <h2>搜索科室挂号</h2>
              </div>
              <button class="go-button" type="button">去挂号</button>
            </article>

            <article class="register-card">
              <div class="register-card__lead">
                <span class="register-icon">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5.5c1.7 0 3 1.3 3 3v1.2c1 .6 1.7 1.7 1.7 2.9V18H7.3v-5.4c0-1.2.7-2.3 1.7-2.9V8.5c0-1.7 1.3-3 3-3z"></path>
                    <path d="M10.5 4h3M12 3v2.5M8.8 18c.5-2.6 1.5-4 3.2-4s2.7 1.4 3.2 4"></path>
                  </svg>
                </span>
                <h2>搜索医生挂号</h2>
              </div>
              <button class="go-button" type="button">去挂号</button>
            </article>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
